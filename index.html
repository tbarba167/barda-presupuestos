document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

2px 6px; border-radius: 4px; }\n.delivery-result { display: flex; align-items: center; justify-content: center; padding: 10px 18px; border: 1.5px solid var(--sand); border-radius: 7px; font-family: var(--font-d); font-size: 17px; min-height: 42px; background: var(--cream); color: var(--stone); transition: all 0.25s; }\n.delivery-result.has-date { background: var(--brown); border-color: var(--brown); color: var(--cream); }\n.actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 18px; }\n.btn-print { padding: 11px 28px; background: var(--terra); color: var(--white); border: none; border-radius: 8px; font-family: var(--font-b); font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; font-weight: 700; cursor: pointer; transition: background 0.2s; display: flex; align-items: center; gap: 8px; }\n.btn-print:hover { background: var(--brown); }\n.btn-clear { padding: 11px 22px; background: transparent; color: var(--stone); border: 1.5px solid var(--sand); border-radius: 8px; font-family: var(--font-b); font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 600; cursor: pointer; transition: all 0.2s; }\n.btn-clear:hover { border-color: var(--error); color: var(--error); }\n@media print {\n  body { background: white; font-size: 13px; }\n  header { box-shadow: none !important; position: static !important; }\n  .no-print { display: none !important; }\n  .print-qty { display: inline !important; }\n  .card { box-shadow: none; border: 1px solid #ddd; margin-bottom: 16px; padding: 18px 20px; }\n  main { padding: 0 !important; }\n  .summary-box { border: 1px solid #ddd; }\n  .btn-rm, .qty-ctrl { display: none; }\n  input[type=\"date\"] { border: none; font-size: 13px; padding: 0; }\n}\n.print-qty { display: none; }\n@media (max-width: 680px) {\n  header { padding: 12px 16px !important; }\n  main { padding: 20px 14px 48px !important; }\n  .card { padding: 18px 16px; }\n  .form-row { flex-direction: column; }\n  .form-group.narrow, .form-group.wide { flex: none; min-width: 0; width: 100%; }\n  .summary-box { width: 100%; }\n  .actions { flex-direction: column; }\n}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<header style=\"background:var(--white);border-bottom:1.5px solid var(--sand);padding:14px 32px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 12px rgba(61,31,13,0.06);position:sticky;top:0;z-index:100\">\n  <div style=\"display:flex;align-items:center;gap:16px\">\n    <img src=\"8dc77b8b-837d-4b02-ac84-631218153bd2\" style=\"height:60px;width:auto;display:block\" alt=\"Barda Home\">\n    <div style=\"width:1px;height:36px;background:var(--sand)\"><\u002Fdiv>\n    <div style=\"font-family:var(--font-b);font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:var(--terra);font-weight:600\">Presupuestos<\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"display:flex;align-items:center;gap:10px\">\n    <span style=\"font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--stone);font-weight:600\">Fecha<\u002Fspan>\n    <input type=\"date\" id=\"budget-date\" style=\"padding:7px 12px;border:1.5px solid var(--sand);border-radius:7px;font-family:var(--font-b);font-size:13px;color:var(--brown);background:var(--white);cursor:pointer;outline:none\">\n  <\u002Fdiv>\n<\u002Fheader>\n\n<main style=\"max-width:1080px;margin:0 auto;padding:36px 24px 60px\">\n  <div id=\"app\">\n    <div class=\"card\">\n      <div class=\"state-msg\">\n        <div class=\"spinner\"><\u002Fdiv>\n        <div>Cargando lista de precios...<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fmain>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  API_URL = 'https://script.google.com/macros/s/AKfycbxJZBAhXO_D-tJjy6Wnp40Tl0ZZdJuDYfMhQIKopaSWGPZ8olLW1IDuoUsPSfM78-FM/exec';\n  FABRIC_NAMES = ['Lienzo', 'Lino', 'Pana', 'Funda Tusor', 'Sin Tela'];\n\n  chairsData = [];\n  chairColorLists = {};\n  tablesData = [];\n  mesaOptions = { baseTypes: [], microColores: [], microVeteados: [], microBrillos: [] };\n  circularData = [];\n  circularOptions = { baseTypes: [], microColores: [], microVeteados: [], microBrillos: [] };\n  ratonasData = [];\n  pagosData = [\n    { name: 'Efectivo o Transferencia', recargo: -0.10 },\n    { name: '3 cuotas sin interés',     recargo: 0 },\n    { name: '6 cuotas sin interés',     recargo: 0.10 },\n  ];\n\n  quoteItems = [];\n  nextId = 1;\n  form = {\n    tab: 'silla',\n    silla:    { model: '', wood: '', fabric: '', color: '' },\n    mesa:     { wood: '', w: '', h: '', base: '', color: '', veteado: '', brillo: '' },\n    circular: { wood: '', w: '', h: '', base: '', color: '', veteado: '', brillo: '' },\n    ratona:   { wood: '', w: '', h: '' },\n  };\n  cliente = { nombre: '', telefono: '', cuit: '', direccion: '' };\n  selectedPago  = 0;\n  discountType  = '%';\n  discountValue = 0;\n  finalPrice    = null;\n  deliveryDays  = 30;\n  budgetDate    = '';\n  deliveryDays  = '';\n\n  renderVals() { return {}; }\n\n  componentDidMount() {\n    const today = new Date().toISOString().split('T')[0];\n    this.budgetDate = today;\n    const dateInput = document.getElementById('budget-date');\n    if (dateInput) {\n      dateInput.value = today;\n      dateInput.addEventListener('change', function(e) {\n        this.budgetDate = e.target.value;\n        this.renderUI();\n      }.bind(this));\n    }\n    window.__bardaPrint = function() { this.printQuote(); }.bind(this);\n    this.init();\n  }\n\n  // ─── UTILS ──────────────────────────────────────────────────────────────────\n  titleCase(s) { return s.toLowerCase().replace(/\\b\\w/g, function(c) { return c.toUpperCase(); }); }\n\n  parsePrice(str) {\n    if (!str || !String(str).trim()) return null;\n    var n = parseFloat(String(str).replace(/[$\\s.]/g, '').replace(',', '.'));\n    return isNaN(n) ? null : n;\n  }\n\n  fmt(n) {\n    if (n === null || n === undefined) return '—';\n    return '$ ' + Math.ro "s-value suggested\">' + this.fmt(suggested) + '<\u002Fspan><\u002Fdiv>';\n    }\n\n    return '<div class=\"card\">' +\n      '<div class=\"card-title\">Detalle del presupuesto<\u002Fdiv>' +\n      (this.quoteItems.length === 0\n        ? '<div class=\"quote-empty\">A\\u00fan no hay productos en el presupuesto.<\u002Fdiv>'\n        : '<table><thead><tr><th>Producto<\u002Fth><th>Cantidad<\u002Fth><th>Precio unit.<\u002Fth><th style=\"text-align:right\">Subtotal<\u002Fth><th class=\"no-print\" style=\"width:40px\"><\u002Fth><\u002Ftr><\u002Fthead><tbody>' + rows + '<\u002Ftbody><\u002Ftable>'\n      ) +\n      '<div class=\"summary-wrap\"><div class=\"summary-box\">' +\n        '<div class=\"summary-row\"><span class=\"s-label\">Subtotal<\u002Fspan><span class=\"s-value\">' + this.fmt(subtotal) + '<\u002Fspan><\u002Fdiv>' +\n        '<div class=\"summary-row no-print\"><span class=\"s-label\">Descuento comercial<\u002Fspan>' +\n          '<div class=\"disc-wrap\">' +\n            '<button class=\"dtype-btn ' + (this.discountType==='%'?'active':'') + '\" data-dtype=\"%\">%<\u002Fbutton>' +\n            '<button class=\"dtype-btn ' + (this.discountType==='$'?'active':'') + '\" data-dtype=\"$\">$<\u002Fbutton>' +\n            '<input type=\"number\" id=\"disc-val\" min=\"0\" value=\"' + this.discountValue + '\" placeholder=\"0\">' +\n          '<\u002Fdiv><\u002Fdiv>' +\n        discountRows +\n      '<\u002Fdiv><\u002Fdiv>' +\n    '<\u002Fdiv>';\n  }\n\n  renderPagosSection(basePrice) {\n    var pago = this.pagosData[this.selectedPago] || this.pagosData[0];\n    var recargo = pago.recargo || 0;\n    var totalConRec = Math.round(basePrice * (1 + recargo));\n    var m = pago.name.match(/(\\d+)\\s*cuotas/i);\n    var cuotas = m ? m[1] : null;\n    var mensual = cuotas ? Math.round(totalConRec / parseInt(cuotas)) : null;\n    var self = this;\n\n    var cards = this.pagosData.map(function(p, i) {\n      return '<div class=\"pago-card ' + (i===self.selectedPago?'selected':'') + '\" data-pago=\"' + i + '\">' +\n        '<div class=\"pago-card-name\">' + p.name + '<\u002Fdiv>' +\n        '<div class=\"pago-card-tag\">' + (p.recargo === 0 ? 'Sin recargo' : (p.recargo > 0 ? '+' + Math.round(p.recargo*100) + '% recargo' : Math.round(Math.abs(p.recargo)*100) + '% descuento')) + '<\u002Fdiv>' +\n      '<\u002Fdiv>';\n    }).join('');\n\n    var recargoRow = recargo > 0\n      ? '<div class=\"summary-row\"><span class=\"s-label\">Recargo (' + Math.round(recargo*100) + '%)<\u002Fspan><span class=\"s-value\" style=\"color:var(--terra)\">+ ' + this.fmt(basePrice * recargo) + '<\u002Fspan><\u002Fdiv>'\n      : (recargo < 0\n        ? '<div class=\"summary-row\"><span class=\"s-label\">Descuento (' + Math.round(Math.abs(recargo)*100) + '%)<\u002Fspan><span class=\"s-value discount\">&#8722; ' + this.fmt(basePrice * Math.abs(recargo)) + '<\u002Fspan><\u002Fdiv>'\n        : '');\n    var cuotaRow = mensual\n      ? '<div class=\"cuota-highlight\"><span class=\"cuota-label\">' + cuotas + ' cuotas mensuales de<\u002Fspan><span class=\"cuota-value\">' + this.fmt(mensual) + ' / mes<\u002Fspan><\u002Fdiv>'\n      : '';\n    var printRow = '<div class=\"print-pago\" style=\"display:none;margin-top:12px\"><strong>Forma de pago:<\u002Fstrong> ' + pago.name +\n      (recargo > 0 ? ' &middot; Recargo ' + Math.round(recargo*100) + '% &middot; Total: ' + this.fmt(totalConRec) : (recargo < 0 ? ' &middot; Descuento ' + Math.round(Math.abs(recargo)*100) + '% &middot; Total: ' + this.fmt(totalConRec) : ' &middot; Total: ' + this.fmt(totalConRec))) +\n      (mensual ? ' &middot; ' + cuotas + ' cuotas de ' + this.fmt(mensual) + '/mes' : '') +\n    '<\u002Fdiv>';\n\n    return '<div class=\"card\">' +\n      '<div class=\"card-title\">Forma de pago<\u002Fdiv>' +\n      '<div class=\"pago-cards no-print\">' + cards + '<\u002Fdiv>' +\n      '<div class=\"summary-box\" style=\"margin-top:16px\">' +\n        recargoRow +\n        '<div class=\"summary-row total-row\"><span class=\"total-label\">Total con ' + pago.name + '<\u002Fspan><span class=\"total-value\">' + this.fmt(totalConRec) + '<\u002Fspan><\u002Fdiv>' +\n        cuotaRow +\n      '<\u002Fdiv>' +\n      printRow +\n      this.renderDeliverySection() +\n      '<div class=\"actions no-print\" style=\"margin-top:24px\">' +\n        '<button class=\"btn-clear\" id=\"btn-clear\">Limpiar presupuesto<\u002Fbutton>' +\n        '<button class=\"btn-print\" onclick=\"window.__bardaPrint()\">' +\n          '<svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"6 9 6 2 18 2 18 9\"><\u002Fpolyline><path d=\"M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2\"><\u002Fpath><rect x=\"6\" y=\"14\" width=\"12\" height=\"8\"><\u002Frect><\u002Fsvg>' +\n          'Imprimir / PDF' +\n        '<\u002Fbutton>' +\n      '<\u002Fdiv>' +\n    '<\u002Fdiv>';\n  }\n\n  // ─── BIND ────────────────────────────────────────────────────────────────────\n  bind() {\n    var self = this;\n\n    document.querySelectorAll('.tab').forEach(function(btn) {\n      btn.addEventListener('click', function() { self.form.tab = btn.dataset.tab; self.renderUI(); });\n    });\n\n    // ── Sillas ──\n    var sModel  = document.getElementById('s-model');\n    var sWood   = document.getElementById('s-wood');\n    var sFabric = document.getElementById('s-fabric');\n    var sColor  = document.getElementById('s-color');\n    if (sModel)  sModel.addEventListener('change',  function() { self.form.silla = { model: sModel.value, wood: '', fabric: '', color: '' }; self.renderUI(); });\n    if (sWood)   sWood.addEventListener('change',   function() { self.form.silla.wood = sWood.value; self.form.silla.fabric = ''; self.form.silla.color = ''; self.renderUI(); });\n    if (sFabric) sFabric.addEventListener('change', function() { self.form.silla.fabric = sFabric.value; self.form.silla.color = ''; self.renderUI(); });\n    if (sColor)  sColor.addEventListener('change',  function() { self.form.silla.color = sColor.value; self.renderUI(); });\n\n    var btnSilla = document.getElementById('btn-silla');\n    if (btnSilla) btnSilla.addEventListener('click', function() {\n      var f = self.form.silla;\n      var product = self.chairsData.filter(function(c) { return c.name === f.model; })[0];\n      var price = product && product.prices[f.wood] && product.prices[f.wood][f.fabric];\n      if (!price) return;\n      var needsColor = self.fabricHasColors(f.fabric);\n      if (needsColor && !f.color) return;\n      var qty = parseInt((document.getElementById('s-qty') || {}).value) || 1;\n      var detail = self.titleCase(f.wood) + ' \\u00b7 ' + f.fabric;\n      if (needsColor && f.color) detail += ' \\u00b7 Color: ' + f.color;\n      self.quoteItems.push({ id: self.nextId++, name: f.model, detail: detail, unitPrice: price, qty: qty });\n      self.form.silla = { model: '', wood: '', fabric: '', color: '' };\n      self.finalPrice = null;\n      self.renderUI();\n    });\n\n    // ── Mesas & Circulares ──\n    var mesaIds     = { wood:'m-wood', w:'m-w', h:'m-h', base:'m-base', color:'m-color', veteado:'m-veteado', brillo:'m-brillo', qty:'m-qty', btn:'btn-mesa' };\n    var circularIds = { wood:'c-wood', w:'c-w', h:'c-h', base:'c-base', color:'c-color', veteado:'c-veteado', brillo:'c-brillo', qty:'c-qty', btn:'btn-circular' };\n    this.bindMesaForm(this.form.mesa,     this.tablesData,   this.mesaOptions,    mesaIds,     'Mesa');\n    this.bindMesaForm(this.form.circular, this.circularData, this.circularOptions, circularIds, 'Mesa Circular');\n\n    // ── Ratonas ──\n    var rWood = document.getElementById('r-wood');\n    var rW    = document.getElementById('r-w');\n    var rH    = document.getElementById('r-h');\n    if (rWood) rWood.addEventListener('change', function() { self.form.ratona.wood = rWood.value; self.renderUI(); });\n    if (rW)    rW.addEventListener('input',    function() { self.form.ratona.w = rW.value; self.renderUI(); });\n    if (rH)    rH.addEventListener('input',    function() { self.form.ratona.h = rH.value; self.renderUI(); });\n    var btnRatona = document.getElementById('btn-ratona');\n    if (btnRatona) btnRatona.addEventListener('click', function() {\n      var f = self.form.ratona;\n      var product = self.ratonasData.filter(function(t) { return t.name === f.wood; })[0];\n      var wn = self.parseNum(f.w), hn = self.parseNum(f.h);\n      if (!product || !wn || !hn) return;\n      var m2 = wn * hn;\n      self.quoteItems.push({ id: self.nextId++, name: 'Mesa Ratona ' + f.wood, detail: wn + 'm \\u00d7 ' + hn + 'm = ' + m2.toFixed(2) + 'm\\u00b2 \\u00b7 ' + self.fmt(product.pricePerM2) + '/m\\u00b2', unitPrice: product.pricePerM2 * m2, qty: parseInt((document.getElementById('r-qty')||{}).value) || 1 });\n      self.form.ratona = { wood: '', w: '', h: '' };\n      self.finalPrice = null;\n      self.renderUI();\n    });\n\n    // ── Quote ──\n    document.querySelectorAll('[data-action]').forEach(function(btn) {\n      btn.addEventListener('click', function() {\n        var id = parseInt(btn.dataset.id);\n        var item = self.quoteItems.filter(function(it) { return it.id === id; })[0];\n        if (!item) return;\n        if (btn.dataset.action === 'inc') item.qty++;\n        else if (item.qty > 1) item.qty--;\n        self.finalPrice = null; self.renderUI();\n      });\n    });\n    document.querySelectorAll('.btn-rm').forEach(function(btn) {\n      btn.addEventListener('click', function() {\n        var id = parseInt(btn.dataset.id);\n        self.quoteItems = self.quoteItems.filter(function(it) { return it.id !== id; });\n        self.finalPrice = null; self.renderUI();\n      });\n    });\n\n    // ── Discount ──\n    document.querySelectorAll('.dtype-btn').forEach(function(btn) {\n      btn.addEventListener('click', function() { self.discountType = btn.dataset.dtype; self.finalPrice = null; self.renderUI(); });\n    });\n    var discVal = document.getElementById('disc-val');\n    if (discVal) discVal.addEventListener('input', function(e) { self.discountValue = parseFloat(e.target.value) || 0; self.finalPrice = null; self.renderUI(); });\n\n    // ── Pagos ──\n    document.querySelectorAll('.pago-card').forEach(function(card) {\n      card.addEventListener('click', function() { self.selectedPago = parseInt(card.dataset.pago); self.renderUI(); });\n    });\n\n    // ── Cliente ──\n    var cliNombre   = document.getElementById('cli-nombre');\n    var cliTelefono = document.getElementById('cli-telefono');\n    if (cliNombre)   cliNombre.addEventListener('input',   function(e) { self.cliente.nombre    = e.target.value; });\n    if (cliTelefono) cliTelefono.addEventListener('input', function(e) { self.cliente.telefono  = e.target.value; });\n    var cliCuit      = document.getElementById('cli-cuit');\n    var cliDireccion = document.getElementById('cli-direccion');\n    if (cliCuit)      cliCuit.addEventListener('input',      function(e) { self.cliente.cuit      = e.target.value; });\n    if (cliDireccion) cliDireccion.addEventListener('input', function(e) { self.cliente.direccion = e.target.value; });\n\n    // ── Delivery days ──\n    var deliveryInput = document.getElementById('delivery-days');\n    if (deliveryInput) deliveryInput.addEventListener('input', function(e) {\n      self.deliveryDays = e.target.value;\n      self.renderUI();\n    });\n\n    // ── Clear ──\n    var btnClear = document.getElementById('btn-clear');\n    if (btnClear) btnClear.addEventListener('click', function() {\n      if (!self.quoteItems.length) return;\n      if (!confirm('\\u00bfLimpiar todo el presupuesto?')) return;\n      self.quoteItems = []; self.discountValue = 0; self.finalPrice = null; self.renderUI();\n    });\n  }\n\n  bindMesaForm(source, data, opts, ids, label) {\n    var self = this;\n    var get = function(id) { return document.getElementById(id); };\n\n    var elWood    = get(ids.wood);\n    var elBase    = get(ids.base);\n    var elColor   = get(ids.color);\n    var elVeteado = get(ids.veteado);\n    var elBrillo  = get(ids.brillo);\n    var elW       = get(ids.w);\n    var elH       = get(ids.h);\n\n    if (elWood) elWood.addEventListener('change', function() {\n      source.wood = elWood.value;\n      source.base = ''; source.color = ''; source.veteado = ''; source.brillo = '';\n      self.renderUI();\n    });\n    if (elBase)    elBase.addEventListener('change',    function() { source.base    = elBase.value;    self.renderUI(); });\n    if (elColor)   elColor.addEventListener('change',   function() { source.color   = elColor.value;   self.renderUI(); });\n    if (elVeteado) elVeteado.addEventListener('change', function() { source.veteado = elVeteado.value; self.renderUI(); });\n    if (elBrillo)  elBrillo.addEventListener('change',  function() { source.brillo  = elBrillo.value;  self.renderUI(); });\n    if (elW) elW.addEventListener('input', function() { source.w = elW.value; self.renderUI(); });\n    if (elH) elH.addEventListener('input', function() { source.h = elH.value; self.renderUI(); });\n\n    var btnEl = get(ids.btn);\n    if (btnEl) btnEl.addEventListener('click', function() {\n      var wood = source.wood, w = source.w, h = source.h;\n      var base = source.base, color = source.color, veteado = source.veteado, brillo = source.brillo;\n      var product = data.filter(function(t) { return t.name === wood; })[0];\n      var wn = self.parseNum(w), hn = self.parseNum(h);\n      if (!product || !wn || !hn || !base) return;\n      var isMicro = wood === 'Microcemento';\n      if (isMicro && (!color || !veteado || !brillo)) return;\n      var m2 = wn * hn;\n      var detail = wn + 'm \\u00d7 ' + hn + 'm = ' + m2.toFixed(2) + 'm\\u00b2 \\u00b7 ' + self.fmt(product.pricePerM2) + '/m\\u00b2 \\u00b7 Base: ' + base;\n      if (isMicro) detail += ' \\u00b7 ' + color + ' \\u00b7 ' + veteado + ' \\u00b7 ' + brillo;\n      self.quoteItems.push({ id: self.nextId++, name: label + ' ' + wood, detail: detail, unitPrice: product.pricePerM2 * m2, qty: parseInt((get(ids.qty)||{}).value) || 1 });\n      source.wood = ''; source.w = ''; source.h = ''; source.base = ''; source.color = ''; source.veteado = ''; source.brillo = '';\n      self.finalPrice = null;\n      self.renderUI();\n    });\n  }\n\n  // ─── FETCH ───────────────────────────────────────────────────────────────────\n  async init() {\n    try {\n      var res = await fetch(this.API_URL);\n      if (!res.ok) throw new Error('HTTP ' + res.status);\n      var data = await res.json();\n\n      this.chairsData      = this.parseChairsRows(data.chairs || []);\n      this.chairColorLists = this.parseChairColorLists(data.chairs || []);\n      this.tablesData      = this.parseTablesRows(data.tables || []);\n      this.mesaOptions     = this.parseMesaOptions(data.tables || []);\n      this.ratonasData     = this.parseTablesRows(data.ratonas || []);\n\n      if (data.circularTables && data.circularTables.length) {\n        this.circularData = this.parseTablesRows(data.circularTables);\n        var cOpts = this.parseMesaOptions(data.circularTables);\n        this.circularOptions = cOpts.baseTypes.length > 0 ? cOpts : this.mesaOptions;\n      } else {\n        this.circularData    = [];\n        this.circularOptions = this.mesaOptions;\n      }\n\n      this.renderUI();\n    } catch(err) {\n      var el = document.getElementById('app');\n      if (el) el.innerHTML = '<div class=\"card\"><div class=\"state-msg\" style=\"color:var(--error)\"><div style=\"font-size:32px;margin-bottom:12px\">&#9888;<\u002Fdiv><strong>No se pudo cargar la lista de precios<\u002Fstrong><br><small style=\"color:var(--stone);margin-top:8px;display:block\">' + err.message + '<\u002Fsmall><\u002Fdiv><\u002Fdiv>';\n    }\n  }\n\n  // ─── PRINT ───────────────────────────────────────────────────────────────────\n  printQuote() {\n    document.querySelectorAll('.print-pago').forEach(function(el) { el.style.display = 'block'; });\n    window.print();\n    document.querySelectorAll('.print-pago').forEach(function(el) { el.style.display = 'none'; });\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
